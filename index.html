<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangent Loop</title>
    <meta name="description" content="Tangent Loop — Delightful Apps, thoughtfully made.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: #FFFFFF;
            background: #000000;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
        }

        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .logo {
            margin-bottom: 16px;
        }

        .logo img {
            width: min(90vw, 960px);
            height: auto;
        }

        .tagline {
            font-size: 17px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            letter-spacing: 0.02em;
            text-align: center;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 24px;
        }

        .footer a {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .footer .contact a {
            letter-spacing: 0.02em;
            text-transform: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .footer .contact a:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .copyright {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="logo">
            <img src="logo.png" alt="Tangent Loop">
        </div>
        <p class="tagline">Delightfully thoughtful apps. Coming soon...</p>
    </main>
    <footer class="footer">
        <span class="contact"><a href="mailto:gday@tangentloop.com">gday@tangentloop.com</a></span>
        <a href="privacy.html">Privacy</a>
        <span class="copyright">&copy; 2026 Tangent Loop</span>
    </footer>
</body>
</html>
